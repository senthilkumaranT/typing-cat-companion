<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 16" width="28" height="16">
    <!-- Tail -->
    <path d="M 6 10 C 4 10, 4 14, 9 14 C 11 14, 11 13, 11 13" fill="none" stroke="#2C3E50" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M 6 10 C 4 10, 4 14, 9 14 C 11 14, 11 13, 11 13" fill="none" stroke="#FFFFFF" stroke-width="1" stroke-linecap="round"/>
    
    <!-- Body -->
    <ellipse cx="11.5" cy="10" rx="5.5" ry="4.5" fill="#FFFFFF" stroke="#2C3E50" stroke-width="1" />
    
    <!-- Stripe on body -->
    <path d="M 10 6.5 Q 11 8.5 10.5 10.5" fill="none" stroke="#F1F2F6" stroke-width="1" stroke-linecap="round" />
    
    <!-- Head -->
    <circle cx="16.5" cy="9.5" r="3.8" fill="#FFFFFF" stroke="#2C3E50" stroke-width="1" />
    
    <!-- Ears -->
    <polygon points="13.5,6.5 14.5,3.5 16,6" fill="#FFFFFF" stroke="#2C3E50" stroke-width="1" stroke-linejoin="round"/>
    <polygon points="13.9,6.2 14.6,4.2 15.5,5.8" fill="#FFD2D2" />
    
    <polygon points="16,6 17.5,3.5 18.5,6.5" fill="#FFFFFF" stroke="#2C3E50" stroke-width="1" stroke-linejoin="round"/>
    <polygon points="16.5,5.8 17.4,4.2 18.1,6.2" fill="#FFD2D2" />
    
    <!-- Sleeping Eyes (closed) -->
    <path d="M 15.2 9.8 Q 16 10.5 16.5 9.8" fill="none" stroke="#2C3E50" stroke-width="0.8" stroke-linecap="round" />
    <path d="M 17.2 9.8 Q 18 10.5 18.5 9.8" fill="none" stroke="#2C3E50" stroke-width="0.8" stroke-linecap="round" />
    
    <!-- Nose -->
    <polygon points="16.7,10.6 17.1,10.6 16.9,10.9" fill="#FFD2D2" />

    <!-- Cute Pink Bow -->
    <g id="pookie-bow" transform="translate(14.8, 6.0)">
        <!-- Left loop -->
        <path d="M 0 0 C -0.5 -1, -2 -1, -2 0 C -2 1, -0.5 1, 0 0 Z" fill="#FF8DA1" stroke="#2C3E50" stroke-width="0.4" stroke-linejoin="round" />
        <!-- Right loop -->
        <path d="M 0 0 C 0.5 -1, 2 -1, 2 0 C 2 1, 0.5 1, 0 0 Z" fill="#FF8DA1" stroke="#2C3E50" stroke-width="0.4" stroke-linejoin="round" />
        <!-- Ribbon tail left -->
        <path d="M -0.4 0.4 L -1.0 1.6 L -0.5 1.5 L 0 0.4" fill="#FF6B8B" stroke="#2C3E50" stroke-width="0.3" stroke-linejoin="round" />
        <!-- Ribbon tail right -->
        <path d="M 0.4 0.4 L 1.0 1.6 L 0.5 1.5 L 0 0.4" fill="#FF6B8B" stroke="#2C3E50" stroke-width="0.3" stroke-linejoin="round" />
        <!-- Center knot -->
        <circle cx="0" cy="0" r="0.6" fill="#FF6B8B" stroke="#2C3E50" stroke-width="0.4" />
    </g>
  </svg>
