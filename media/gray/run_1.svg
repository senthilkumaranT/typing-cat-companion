<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 16" width="28" height="16">
    <!-- Tail -->
    <path d="M 5 7 C 2 7, 2 3, 1 5" fill="none" stroke="#2F3542" stroke-width="2" stroke-linecap="round"/>
    <path d="M 5 7 C 2 7, 2 3, 1 5" fill="none" stroke="#A4B0BE" stroke-width="1.2" stroke-linecap="round"/>

    <!-- Back Leg 1 (extended left) -->
    <line x1="7" y1="10" x2="3" y2="12" stroke="#2F3542" stroke-width="2.2" stroke-linecap="round" />
    <line x1="7" y1="10" x2="3" y2="12" stroke="#A4B0BE" stroke-width="1.2" stroke-linecap="round" />

    <!-- Back Leg 2 (extended left/down) -->
    <line x1="9" y1="10" x2="5" y2="13.5" stroke="#2F3542" stroke-width="2.2" stroke-linecap="round" />
    <line x1="9" y1="10" x2="5" y2="13.5" stroke="#A4B0BE" stroke-width="1.2" stroke-linecap="round" />

    <!-- Body -->
    <ellipse cx="12.5" cy="8.5" rx="6.5" ry="3.5" fill="#A4B0BE" stroke="#2F3542" stroke-width="1" />
    
    <path d="M 12 5.5 C 12 7.5, 13 7.5, 12 11.5" fill="none" stroke="#747D8C" stroke-width="0.8" />

    <!-- Front Leg 1 (extended right/down) -->
    <line x1="16.5" y1="10" x2="19" y2="13.5" stroke="#2F3542" stroke-width="2.2" stroke-linecap="round" />
    <line x1="16.5" y1="10" x2="19" y2="13.5" stroke="#A4B0BE" stroke-width="1.2" stroke-linecap="round" />

    <!-- Front Leg 2 (extended far right) -->
    <line x1="17.5" y1="9.5" x2="22.5" y2="11.5" stroke="#2F3542" stroke-width="2.2" stroke-linecap="round" />
    <line x1="17.5" y1="9.5" x2="22.5" y2="11.5" stroke="#A4B0BE" stroke-width="1.2" stroke-linecap="round" />

    <!-- Head -->
    <circle cx="18" cy="6.5" r="3.5" fill="#A4B0BE" stroke="#2F3542" stroke-width="1" />
    
    <!-- Ears -->
    <polygon points="15.5,4 16,1 17.5,3.5" fill="#A4B0BE" stroke="#2F3542" stroke-width="1" stroke-linejoin="round"/>
    <polygon points="17.5,3.5 19,1 19.5,4" fill="#A4B0BE" stroke="#2F3542" stroke-width="1" stroke-linejoin="round"/>
    <polygon points="16,3.5 16.3,1.8 17.1,3.3" fill="#FFD2D2" />
    <polygon points="17.9,3.3 18.7,1.8 19,3.5" fill="#FFD2D2" />

    <!-- Eyes (focused/running) -->
    <circle cx="17.8" cy="6.2" r="0.6" fill="#2F3542" />
    <circle cx="19.3" cy="6.2" r="0.6" fill="#2F3542" />
    
    <!-- Nose -->
    <polygon points="18.5,6.8 18.9,6.8 18.7,7.0" fill="#FFD2D2" />
  </svg>