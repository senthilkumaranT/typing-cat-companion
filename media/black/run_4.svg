<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 16" width="28" height="16">
    <!-- Tail -->
    <path d="M 5 7.5 C 2 7.5, 2.5 3.5, 1 5" fill="none" stroke="#1E272E" stroke-width="2" stroke-linecap="round"/>
    <path d="M 5 7.5 C 2 7.5, 2.5 3.5, 1 5" fill="none" stroke="#2D3436" stroke-width="1.2" stroke-linecap="round"/>

    <!-- Back Leg 1 (pushing off left) -->
    <line x1="7.5" y1="10" x2="4.5" y2="13.2" stroke="#1E272E" stroke-width="2.2" stroke-linecap="round" />
    <line x1="7.5" y1="10" x2="4.5" y2="13.2" stroke="#FFFFFF" stroke-width="1.2" stroke-linecap="round" />

    <!-- Back Leg 2 (pushing down) -->
    <line x1="9" y1="10" x2="7.5" y2="13.5" stroke="#1E272E" stroke-width="2.2" stroke-linecap="round" />
    <line x1="9" y1="10" x2="7.5" y2="13.5" stroke="#FFFFFF" stroke-width="1.2" stroke-linecap="round" />

    <!-- Body -->
    <ellipse cx="12.5" cy="8.2" rx="6" ry="3.6" fill="#2D3436" stroke="#1E272E" stroke-width="1" />
    <ellipse cx="13.7" cy="9.2" rx="3.5" ry="2.2" fill="#FFFFFF" />
    

    <!-- Front Leg 1 (reaching high) -->
    <line x1="16.5" y1="9.5" x2="19.5" y2="12" stroke="#1E272E" stroke-width="2.2" stroke-linecap="round" />
    <line x1="16.5" y1="9.5" x2="19.5" y2="12" stroke="#FFFFFF" stroke-width="1.2" stroke-linecap="round" />

    <!-- Front Leg 2 (reaching forward/up) -->
    <line x1="17.5" y1="9" x2="21" y2="11.5" stroke="#1E272E" stroke-width="2.2" stroke-linecap="round" />
    <line x1="17.5" y1="9" x2="21" y2="11.5" stroke="#FFFFFF" stroke-width="1.2" stroke-linecap="round" />

    <!-- Head -->
    <circle cx="17.8" cy="6" r="3.5" fill="#2D3436" stroke="#1E272E" stroke-width="1" />
    
    <!-- Ears -->
    <polygon points="15.3,3.5 15.8,0.5 17.3,3" fill="#2D3436" stroke="#1E272E" stroke-width="1" stroke-linejoin="round"/>
    <polygon points="17.3,3 18.8,0.5 19.3,3.5" fill="#2D3436" stroke="#1E272E" stroke-width="1" stroke-linejoin="round"/>
    <polygon points="15.8,3.0 16.1,1.3 16.9,2.8" fill="#FF8080" />
    <polygon points="17.7,2.8 18.5,1.3 18.8,3.0" fill="#FF8080" />

    <!-- Eyes -->
    <circle cx="17.6" cy="5.7" r="0.6" fill="#FFFFFF" />
    <circle cx="19.1" cy="5.7" r="0.6" fill="#FFFFFF" />
    
    <!-- Nose -->
    <polygon points="18.3,6.3 18.7,6.3 18.5,6.5" fill="#FF8080" />
  </svg>