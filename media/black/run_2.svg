<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 16" width="28" height="16">
    <!-- Tail -->
    <path d="M 5.5 8 C 2.5 8, 3 4, 1.5 5.5" fill="none" stroke="#1E272E" stroke-width="2" stroke-linecap="round"/>
    <path d="M 5.5 8 C 2.5 8, 3 4, 1.5 5.5" fill="none" stroke="#2D3436" stroke-width="1.2" stroke-linecap="round"/>

    <!-- Back Leg 1 (tucked down) -->
    <line x1="8" y1="10.5" x2="6.5" y2="13.8" stroke="#1E272E" stroke-width="2.2" stroke-linecap="round" />
    <line x1="8" y1="10.5" x2="6.5" y2="13.8" stroke="#FFFFFF" stroke-width="1.2" stroke-linecap="round" />

    <!-- Back Leg 2 (extended back slightly) -->
    <line x1="9.5" y1="10.5" x2="8.5" y2="14" stroke="#1E272E" stroke-width="2.2" stroke-linecap="round" />
    <line x1="9.5" y1="10.5" x2="8.5" y2="14" stroke="#FFFFFF" stroke-width="1.2" stroke-linecap="round" />

    <!-- Body -->
    <ellipse cx="13" cy="8.7" rx="6.2" ry="3.7" fill="#2D3436" stroke="#1E272E" stroke-width="1" />
    <ellipse cx="14.2" cy="9.7" rx="3.5" ry="2.2" fill="#FFFFFF" />
    

    <!-- Front Leg 1 (landing down) -->
    <line x1="16" y1="10.5" x2="16.5" y2="14.2" stroke="#1E272E" stroke-width="2.2" stroke-linecap="round" />
    <line x1="16" y1="10.5" x2="16.5" y2="14.2" stroke="#FFFFFF" stroke-width="1.2" stroke-linecap="round" />

    <!-- Front Leg 2 (reaching forward) -->
    <line x1="17.5" y1="10" x2="20" y2="13.5" stroke="#1E272E" stroke-width="2.2" stroke-linecap="round" />
    <line x1="17.5" y1="10" x2="20" y2="13.5" stroke="#FFFFFF" stroke-width="1.2" stroke-linecap="round" />

    <!-- Head -->
    <circle cx="18" cy="6.7" r="3.5" fill="#2D3436" stroke="#1E272E" stroke-width="1" />
    
    <!-- Ears -->
    <polygon points="15.5,4.2 16,1.2 17.5,3.7" fill="#2D3436" stroke="#1E272E" stroke-width="1" stroke-linejoin="round"/>
    <polygon points="17.5,3.7 19,1.2 19.5,4.2" fill="#2D3436" stroke="#1E272E" stroke-width="1" stroke-linejoin="round"/>
    <polygon points="16,3.7 16.3,2 17.1,3.5" fill="#FF8080" />
    <polygon points="17.9,3.5 18.7,2 19,3.7" fill="#FF8080" />

    <!-- Eyes -->
    <circle cx="17.8" cy="6.4" r="0.6" fill="#FFFFFF" />
    <circle cx="19.3" cy="6.4" r="0.6" fill="#FFFFFF" />
    
    <!-- Nose -->
    <polygon points="18.5,7 18.9,7 18.7,7.2" fill="#FF8080" />
  </svg>